<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机器人语音助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .robot-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .robot-avatar.listening {
            animation: pulse 1.5s infinite;
        }

        .robot-avatar.speaking {
            animation: bounce 0.6s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            }
            50% {
                transform: scale(1.1);
                box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
            }
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .status-text {
            color: #666;
            font-size: 14px;
        }

        .status-text.listening {
            color: #ff6b6b;
        }

        .chat-container {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            max-height: 300px;
            overflow-y: auto;
        }

        .chat-message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
        }

        .chat-message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            margin: 0 10px;
            flex-shrink: 0;
        }

        .chat-message.robot .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .chat-message.user .message-avatar {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
        }

        .chat-message.robot .message-content {
            background: white;
            border-bottom-left-radius: 4px;
            color: #333;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .chat-message.user .message-content {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border-bottom-right-radius: 4px;
            color: white;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .voice-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
            flex-shrink: 0;
        }

        .voice-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.5);
        }

        .voice-btn.active {
            background: linear-gradient(135deg, #ee5a24 0%, #c0392b 100%);
            animation: pulse-btn 1.5s infinite;
        }

        @keyframes pulse-btn {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .text-input-container {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        .text-input {
            flex: 1;
            padding: 15px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .text-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .tips {
            margin-top: 20px;
            padding: 15px;
            background: rgba(102, 126, 234, 0.05);
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }

        .tips h3 {
            color: #667eea;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .tips p {
            color: #666;
            font-size: 12px;
            line-height: 1.6;
        }

        .empty-chat {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-chat .icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .empty-chat p {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="robot-avatar" id="robotAvatar">🤖</div>
            <h1>语音助手</h1>
            <p class="status-text" id="statusText">点击麦克风开始对话</p>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="empty-chat" id="emptyChat">
                <div class="icon">💬</div>
                <p>开始与机器人对话吧！</p>
                <p style="font-size: 12px; margin-top: 8px; color: #bbb;">可以点击麦克风说话，或直接输入文字</p>
            </div>
        </div>

        <div class="controls">
            <button class="voice-btn" id="voiceBtn" title="按住说话或点击开始/停止">🎤</button>
            <div class="text-input-container">
                <input type="text" class="text-input" id="textInput" placeholder="输入消息..." />
                <button class="send-btn" id="sendBtn" title="发送">➤</button>
            </div>
        </div>

        <div class="tips">
            <h3>💡 使用提示</h3>
            <p>• 点击麦克风按钮开始/停止语音识别<br/>
               • 也可以直接输入文字发送<br/>
               • 支持中文语音识别和语音播报<br/>
               • 建议使用 Chrome 浏览器获得最佳体验</p>
        </div>
    </div>

    <script>
        const robotAvatar = document.getElementById('robotAvatar');
        const statusText = document.getElementById('statusText');
        const chatContainer = document.getElementById('chatContainer');
        const emptyChat = document.getElementById('emptyChat');
        const voiceBtn = document.getElementById('voiceBtn');
        const textInput = document.getElementById('textInput');
        const sendBtn = document.getElementById('sendBtn');

        let recognition = null;
        let isListening = false;
        let isSpeaking = false;

        const responses = {
            greetings: [
                '你好！有什么我可以帮助你的吗？',
                '嗨！很高兴见到你！',
                '你好呀！今天过得怎么样？'
            ],
            thanks: [
                '不客气，这是我应该做的！',
                '很高兴能帮到你！',
                '不用谢，随时为你服务！'
            ],
            bye: [
                '再见！祝你有美好的一天！',
                '拜拜，期待下次见面！',
                '再见，保重！'
            ],
            name: [
                '我是一个语音助手机器人，你可以叫我小助手。',
                '我是你的智能语音助手，很高兴认识你！'
            ],
            time: [
                `现在是 ${new Date().toLocaleString('zh-CN')}。`,
                `当前时间是 ${new Date().toLocaleTimeString('zh-CN')}。`
            ],
            weather: [
                '抱歉，我暂时无法获取天气信息。你可以查看天气应用。',
                '这个功能正在开发中，敬请期待！'
            ],
            joke: [
                '为什么程序员总是分不清万圣节和圣诞节？因为 Oct 31 = Dec 25。',
                '一个 SQL 查询走进酒吧，看见两张桌子，问道：我可以 JOIN 你们吗？',
                '世界上只有 10 种人：懂二进制的和不懂二进制的。'
            ],
            default: [
                '抱歉，我不太明白你的意思。能再说一遍吗？',
                '这个问题我正在学习中，换个话题聊聊吧？',
                '有意思，你能多说说吗？',
                '我明白了，还有其他问题吗？'
            ]
        };

        function initSpeechRecognition() {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = true;
                recognition.lang = 'zh-CN';

                recognition.onstart = function() {
                    isListening = true;
                    robotAvatar.classList.add('listening');
                    statusText.textContent = '正在听你说话...';
                    statusText.classList.add('listening');
                    voiceBtn.classList.add('active');
                };

                recognition.onend = function() {
                    isListening = false;
                    robotAvatar.classList.remove('listening');
                    statusText.textContent = '点击麦克风开始对话';
                    statusText.classList.remove('listening');
                    voiceBtn.classList.remove('active');
                };

                recognition.onresult = function(event) {
                    const result = event.results[0][0].transcript;
                    textInput.value = result;
                    if (event.results[0].isFinal) {
                        setTimeout(() => {
                            sendMessage(result);
                        }, 500);
                    }
                };

                recognition.onerror = function(event) {
                    console.error('语音识别错误:', event.error);
                    isListening = false;
                    robotAvatar.classList.remove('listening');
                    statusText.textContent = '识别出错，请重试';
                    statusText.classList.remove('listening');
                    voiceBtn.classList.remove('active');
                };
            }
        }

        function toggleListening() {
            if (!recognition) {
                alert('您的浏览器不支持语音识别，建议使用 Chrome 浏览器。');
                return;
            }

            if (isListening) {
                recognition.stop();
            } else {
                recognition.start();
            }
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 1;
                utterance.pitch = 1;
                utterance.volume = 1;

                utterance.onstart = function() {
                    isSpeaking = true;
                    robotAvatar.classList.add('speaking');
                    statusText.textContent = '正在说话...';
                };

                utterance.onend = function() {
                    isSpeaking = false;
                    robotAvatar.classList.remove('speaking');
                    statusText.textContent = '点击麦克风开始对话';
                };

                window.speechSynthesis.speak(utterance);
            }
        }

        function getResponse(message) {
            const lowerMsg = message.toLowerCase();
            
            if (lowerMsg.includes('你好') || lowerMsg.includes('嗨') || lowerMsg.includes('早') || lowerMsg.includes('您好')) {
                return responses.greetings[Math.floor(Math.random() * responses.greetings.length)];
            }
            
            if (lowerMsg.includes('谢谢') || lowerMsg.includes('感谢')) {
                return responses.thanks[Math.floor(Math.random() * responses.thanks.length)];
            }
            
            if (lowerMsg.includes('再见') || lowerMsg.includes('拜拜') || lowerMsg.includes('下次')) {
                return responses.bye[Math.floor(Math.random() * responses.bye.length)];
            }
            
            if (lowerMsg.includes('你是谁') || lowerMsg.includes('叫什么') || lowerMsg.includes('名字')) {
                return responses.name[Math.floor(Math.random() * responses.name.length)];
            }
            
            if (lowerMsg.includes('几点') || lowerMsg.includes('时间') || lowerMsg.includes('现在')) {
                return responses.time[Math.floor(Math.random() * responses.time.length)];
            }
            
            if (lowerMsg.includes('天气')) {
                return responses.weather[Math.floor(Math.random() * responses.weather.length)];
            }
            
            if (lowerMsg.includes('笑话') || lowerMsg.includes('搞笑') || lowerMsg.includes('开心')) {
                return responses.joke[Math.floor(Math.random() * responses.joke.length)];
            }
            
            return responses.default[Math.floor(Math.random() * responses.default.length)];
        }

        function addMessage(text, isUser) {
            if (emptyChat) {
                emptyChat.style.display = 'none';
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${isUser ? 'user' : 'robot'}`;
            
            const avatar = isUser ? '👤' : '🤖';
            
            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">${text}</div>
            `;

            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function sendMessage(message) {
            if (!message.trim()) return;
            
            const userMessage = message.trim();
            textInput.value = '';
            
            addMessage(userMessage, true);
            
            setTimeout(() => {
                const botResponse = getResponse(userMessage);
                addMessage(botResponse, false);
                speak(botResponse);
            }, 500);
        }

        function init() {
            initSpeechRecognition();

            voiceBtn.addEventListener('click', toggleListening);

            sendBtn.addEventListener('click', () => {
                sendMessage(textInput.value);
            });

            textInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendMessage(textInput.value);
                }
            });

            textInput.addEventListener('input', () => {
                sendBtn.disabled = !textInput.value.trim();
            });

            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                statusText.textContent = '浏览器不支持语音识别，可使用文字输入';
                statusText.style.color = '#ff6b6b';
                voiceBtn.style.opacity = '0.5';
                voiceBtn.title = '浏览器不支持语音识别';
            }
        }

        init();
    </script>
</body>
</html>
