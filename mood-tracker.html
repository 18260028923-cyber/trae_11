<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日心情记录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .mood-selector {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .mood-selector h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 1.5rem;
        }

        .mood-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .mood-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            font-size: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
            position: relative;
            overflow: hidden;
        }

        .mood-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .mood-btn:hover {
            transform: scale(1.15) rotate(5deg);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .mood-btn:hover::before {
            width: 100px;
            height: 100px;
        }

        .mood-btn.selected {
            border-color: #667eea;
            transform: scale(1.2);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
            animation: bounce 0.5s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1.2); }
            50% { transform: scale(1.3); }
        }

        .mood-btn:active {
            transform: scale(0.95);
        }

        .mood-label {
            position: absolute;
            bottom: -25px;
            font-size: 0.75rem;
            color: #666;
            white-space: nowrap;
        }

        .note-section {
            margin-top: 30px;
        }

        .note-section textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 1rem;
            resize: vertical;
            min-height: 100px;
            transition: border-color 0.3s, box-shadow 0.3s;
            font-family: inherit;
        }

        .note-section textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .history-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: fadeInUp 1s ease-out;
        }

        .history-section h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 1.5rem;
        }

        .mood-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .mood-card:hover {
            transform: translateX(10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .mood-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 5px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 5px;
        }

        .mood-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .mood-emoji {
            font-size: 2rem;
        }

        .mood-date {
            color: #666;
            font-size: 0.9rem;
        }

        .mood-note {
            color: #555;
            line-height: 1.5;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #e0e0e0;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .success-message {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4CAF50;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(76, 175, 80, 0.3);
            animation: slideInRight 0.5s ease-out, fadeOut 0.5s ease-out 2.5s forwards;
            z-index: 1000;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        .stats-section {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 15px;
            text-align: center;
            min-width: 100px;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            .mood-buttons {
                gap: 10px;
            }

            .mood-btn {
                width: 60px;
                height: 60px;
                font-size: 2rem;
            }

            .mood-selector, .history-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌈 每日心情记录</h1>
        
        <div class="mood-selector">
            <h2>今天的心情如何？</h2>
            
            <div class="stats-section">
                <div class="stat-card">
                    <div class="stat-number" id="total-days">0</div>
                    <div class="stat-label">记录天数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="current-streak">0</div>
                    <div class="stat-label">连续记录</div>
                </div>
            </div>
            
            <div class="mood-buttons">
                <button class="mood-btn" data-mood="happy" data-label="开心">
                    😊
                    <span class="mood-label">开心</span>
                </button>
                <button class="mood-btn" data-mood="excited" data-label="兴奋">
                    🤩
                    <span class="mood-label">兴奋</span>
                </button>
                <button class="mood-btn" data-mood="calm" data-label="平静">
                    😌
                    <span class="mood-label">平静</span>
                </button>
                <button class="mood-btn" data-mood="tired" data-label="疲惫">
                    😴
                    <span class="mood-label">疲惫</span>
                </button>
                <button class="mood-btn" data-mood="sad" data-label="难过">
                    😢
                    <span class="mood-label">难过</span>
                </button>
                <button class="mood-btn" data-mood="angry" data-label="生气">
                    😠
                    <span class="mood-label">生气</span>
                </button>
            </div>
            
            <div class="note-section">
                <textarea id="mood-note" placeholder="写点什么记录今天的心情...（可选）"></textarea>
                <button class="submit-btn" id="submit-btn" disabled>保存今日心情</button>
            </div>
        </div>
        
        <div class="history-section">
            <h2>📖 心情历史</h2>
            <div id="mood-list">
                <div class="empty-state">
                    <div class="empty-state-icon">📝</div>
                    <p>还没有心情记录</p>
                    <p>选择一个心情开始记录吧！</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const moodEmojis = {
            happy: '😊',
            excited: '🤩',
            calm: '😌',
            tired: '😴',
            sad: '😢',
            angry: '😠'
        };

        const moodLabels = {
            happy: '开心',
            excited: '兴奋',
            calm: '平静',
            tired: '疲惫',
            sad: '难过',
            angry: '生气'
        };

        let selectedMood = null;
        let moodHistory = JSON.parse(localStorage.getItem('moodHistory')) || [];

        const moodButtons = document.querySelectorAll('.mood-btn');
        const submitBtn = document.getElementById('submit-btn');
        const moodNote = document.getElementById('mood-note');
        const moodList = document.getElementById('mood-list');
        const totalDaysEl = document.getElementById('total-days');
        const currentStreakEl = document.getElementById('current-streak');

        // 初始化
        init();

        function init() {
            renderMoodHistory();
            updateStats();
            checkTodayMood();
        }

        // 心情按钮点击事件
        moodButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                // 移除之前的选中状态
                moodButtons.forEach(b => b.classList.remove('selected'));
                
                // 添加当前选中状态
                this.classList.add('selected');
                selectedMood = this.dataset.mood;
                
                // 启用提交按钮
                submitBtn.disabled = false;
                
                // 点击动画
                this.style.animation = 'none';
                setTimeout(() => {
                    this.style.animation = '';
                }, 10);
            });
        });

        // 提交按钮点击事件
        submitBtn.addEventListener('click', saveMood);

        function saveMood() {
            if (!selectedMood) return;

            const today = new Date();
            const dateStr = today.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                weekday: 'long'
            });

            const moodRecord = {
                id: Date.now(),
                date: dateStr,
                timestamp: today.getTime(),
                mood: selectedMood,
                note: moodNote.value.trim()
            };

            // 检查今天是否已经记录过
            const todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
            const existingToday = moodHistory.find(record => 
                new Date(record.timestamp).toDateString() === today.toDateString()
            );

            if (existingToday) {
                // 更新今天的记录
                const index = moodHistory.indexOf(existingToday);
                moodHistory[index] = moodRecord;
            } else {
                // 添加新记录
                moodHistory.unshift(moodRecord);
            }

            // 保存到 localStorage
            localStorage.setItem('moodHistory', JSON.stringify(moodHistory));

            // 显示成功消息
            showSuccessMessage();

            // 重置表单
            resetForm();

            // 更新显示
            renderMoodHistory();
            updateStats();
        }

        function showSuccessMessage() {
            const message = document.createElement('div');
            message.className = 'success-message';
            message.innerHTML = '✨ 心情记录保存成功！';
            document.body.appendChild(message);

            setTimeout(() => {
                message.remove();
            }, 3000);
        }

        function resetForm() {
            selectedMood = null;
            moodButtons.forEach(b => b.classList.remove('selected'));
            submitBtn.disabled = true;
            moodNote.value = '';
        }

        function renderMoodHistory() {
            if (moodHistory.length === 0) {
                moodList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <p>还没有心情记录</p>
                        <p>选择一个心情开始记录吧！</p>
                    </div>
                `;
                return;
            }

            moodList.innerHTML = moodHistory.map(record => `
                <div class="mood-card">
                    <div class="mood-card-header">
                        <span class="mood-emoji">${moodEmojis[record.mood]}</span>
                        <span class="mood-date">${record.date}</span>
                    </div>
                    ${record.note ? `<div class="mood-note">${record.note}</div>` : ''}
                </div>
            `).join('');
        }

        function updateStats() {
            // 总记录天数
            totalDaysEl.textContent = moodHistory.length;

            // 计算连续记录天数
            currentStreakEl.textContent = calculateStreak();
        }

        function calculateStreak() {
            if (moodHistory.length === 0) return 0;

            let streak = 0;
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // 按时间排序
            const sorted = [...moodHistory].sort((a, b) => b.timestamp - a.timestamp);

            for (let i = 0; i < sorted.length; i++) {
                const recordDate = new Date(sorted[i].timestamp);
                recordDate.setHours(0, 0, 0, 0);

                const expectedDate = new Date(today);
                expectedDate.setDate(today.getDate() - streak);
                expectedDate.setHours(0, 0, 0, 0);

                if (recordDate.getTime() === expectedDate.getTime()) {
                    streak++;
                } else if (i === 0 && recordDate < expectedDate) {
                    // 如果第一条记录不是今天或昨天，说明连续记录中断
                    break;
                }
            }

            return streak;
        }

        function checkTodayMood() {
            const today = new Date();
            const todayMood = moodHistory.find(record => 
                new Date(record.timestamp).toDateString() === today.toDateString()
            );

            if (todayMood) {
                // 今天已经记录过，显示之前的选择
                const btn = document.querySelector(`[data-mood="${todayMood.mood}"]`);
                if (btn) {
                    btn.classList.add('selected');
                    selectedMood = todayMood.mood;
                }
                moodNote.value = todayMood.note || '';
                submitBtn.disabled = false;
                submitBtn.textContent = '更新今日心情';
            }
        }

        // 添加键盘事件
        moodNote.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                if (selectedMood) {
                    saveMood();
                }
            }
        });
    </script>
</body>
</html>
