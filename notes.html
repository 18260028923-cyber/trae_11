<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简约记事本</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 0.6s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .subtitle {
            color: #666;
            font-size: 1rem;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .notes-list {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 20px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .list-header h2 {
            font-size: 1.3rem;
            color: #333;
            font-weight: 500;
        }

        .sort-btn {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #555;
            transition: all 0.3s ease;
        }

        .sort-btn:hover {
            background: #e9ecef;
            border-color: #dee2e6;
        }

        .new-note-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .new-note-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .notes-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .note-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 4px solid #667eea;
            position: relative;
        }

        .note-card:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .note-card.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .note-card.active .note-date {
            color: rgba(255,255,255,0.8);
        }

        .note-card.active .note-preview {
            color: rgba(255,255,255,0.9);
        }

        .note-title {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .note-preview {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .note-date {
            font-size: 0.8rem;
            color: #999;
        }

        .note-actions {
            position: absolute;
            top: 10px;
            right: 10px;
            display: none;
            gap: 5px;
        }

        .note-card:hover .note-actions,
        .note-card.active .note-actions {
            display: flex;
        }

        .delete-btn {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            color: #dc3545;
            transition: all 0.2s ease;
        }

        .delete-btn:hover {
            background: #dc3545;
            color: white;
        }

        .note-editor {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 30px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .editor-header {
            margin-bottom: 20px;
        }

        .note-title-input {
            width: 100%;
            padding: 15px;
            font-size: 1.5rem;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .note-title-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .note-date-display {
            color: #999;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .note-content-input {
            width: 100%;
            padding: 15px;
            font-size: 1rem;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            min-height: 400px;
            resize: vertical;
            transition: all 0.3s ease;
            font-family: inherit;
            line-height: 1.6;
        }

        .note-content-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .editor-actions {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }

        .save-btn, .cancel-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .save-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .cancel-btn {
            background: #f8f9fa;
            color: #555;
            border: 1px solid #e9ecef;
        }

        .cancel-btn:hover {
            background: #e9ecef;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .empty-state h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: #666;
        }

        .empty-state p {
            font-size: 0.95rem;
        }

        .no-note-selected {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            text-align: center;
            padding: 40px;
        }

        .no-note-selected-icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .notes-list {
                max-height: 40vh;
            }

            .note-editor {
                max-height: 60vh;
            }

            h1 {
                font-size: 2rem;
            }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .confirm-modal.show {
            opacity: 1;
            visibility: visible;
        }

        .confirm-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .confirm-modal.show .confirm-content {
            transform: scale(1);
        }

        .confirm-content h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .confirm-content p {
            margin-bottom: 25px;
            color: #666;
        }

        .confirm-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .confirm-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .confirm-btn.primary {
            background: #dc3545;
            color: white;
        }

        .confirm-btn.primary:hover {
            background: #c82333;
        }

        .confirm-btn.secondary {
            background: #f8f9fa;
            color: #555;
            border: 1px solid #e9ecef;
        }

        .confirm-btn.secondary:hover {
            background: #e9ecef;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 简约记事本</h1>
            <p class="subtitle">记录生活中的每一刻</p>
        </header>

        <div class="main-content">
            <div class="notes-list">
                <div class="list-header">
                    <h2>笔记列表</h2>
                    <button class="sort-btn" id="sort-btn">
                        <span id="sort-text">最新优先</span> ▼
                    </button>
                </div>
                <button class="new-note-btn" id="new-note-btn">
                    <span>+</span> 新建笔记
                </button>
                <div class="notes-container" id="notes-container">
                    <!-- 笔记卡片将通过 JavaScript 动态生成 -->
                </div>
            </div>

            <div class="note-editor" id="note-editor">
                <div class="no-note-selected" id="no-note-selected">
                    <div class="no-note-selected-icon">📄</div>
                    <h3>选择或新建笔记</h3>
                    <p>点击左侧的笔记或新建按钮开始编辑</p>
                </div>

                <div id="editor-content" style="display: none;">
                    <div class="editor-header">
                        <input type="text" class="note-title-input" id="note-title" placeholder="笔记标题">
                        <div class="note-date-display" id="note-date"></div>
                    </div>
                    <textarea class="note-content-input" id="note-content" placeholder="开始写下你的想法..."></textarea>
                    <div class="editor-actions">
                        <button class="save-btn" id="save-btn">保存</button>
                        <button class="cancel-btn" id="cancel-btn">取消</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="confirm-modal" id="confirm-modal">
        <div class="confirm-content">
            <h3>确认删除</h3>
            <p>确定要删除这篇笔记吗？此操作不可撤销。</p>
            <div class="confirm-buttons">
                <button class="confirm-btn primary" id="confirm-delete">删除</button>
                <button class="confirm-btn secondary" id="confirm-cancel">取消</button>
            </div>
        </div>
    </div>

    <script>
        // 笔记数据结构
        let notes = [];
        let currentNoteId = null;
        let isNewNote = false;
        let sortOrder = 'desc'; // 'desc' 表示最新优先，'asc' 表示最早优先
        let noteToDelete = null;

        // DOM 元素
        const notesContainer = document.getElementById('notes-container');
        const newNoteBtn = document.getElementById('new-note-btn');
        const sortBtn = document.getElementById('sort-btn');
        const sortText = document.getElementById('sort-text');
        const noNoteSelected = document.getElementById('no-note-selected');
        const editorContent = document.getElementById('editor-content');
        const noteTitleInput = document.getElementById('note-title');
        const noteContentInput = document.getElementById('note-content');
        const noteDateDisplay = document.getElementById('note-date');
        const saveBtn = document.getElementById('save-btn');
        const cancelBtn = document.getElementById('cancel-btn');
        const toast = document.getElementById('toast');
        const confirmModal = document.getElementById('confirm-modal');
        const confirmDelete = document.getElementById('confirm-delete');
        const confirmCancel = document.getElementById('confirm-cancel');

        // 初始化
        init();

        function init() {
            loadNotes();
            renderNotesList();
            setupEventListeners();
        }

        // 加载笔记
        function loadNotes() {
            const savedNotes = localStorage.getItem('notes');
            if (savedNotes) {
                notes = JSON.parse(savedNotes);
            }
        }

        // 保存笔记到本地存储
        function saveNotesToStorage() {
            localStorage.setItem('notes', JSON.stringify(notes));
        }

        // 渲染笔记列表
        function renderNotesList() {
            if (notes.length === 0) {
                notesContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <h3>还没有笔记</h3>
                        <p>点击上方的"新建笔记"按钮开始创建</p>
                    </div>
                `;
                return;
            }

            // 排序笔记
            const sortedNotes = [...notes].sort((a, b) => {
                if (sortOrder === 'desc') {
                    return b.updatedAt - a.updatedAt;
                } else {
                    return a.updatedAt - b.updatedAt;
                }
            });

            notesContainer.innerHTML = sortedNotes.map(note => `
                <div class="note-card ${currentNoteId === note.id ? 'active' : ''}" data-id="${note.id}">
                    <div class="note-actions">
                        <button class="delete-btn" data-id="${note.id}">删除</button>
                    </div>
                    <div class="note-title">${note.title || '无标题'}</div>
                    <div class="note-preview">${note.content || '无内容'}</div>
                    <div class="note-date">${formatDate(note.updatedAt)}</div>
                </div>
            `).join('');

            // 为笔记卡片添加点击事件
            document.querySelectorAll('.note-card').forEach(card => {
                card.addEventListener('click', function(e) {
                    if (e.target.classList.contains('delete-btn')) {
                        // 点击删除按钮
                        noteToDelete = parseInt(e.target.dataset.id);
                        showConfirmModal();
                    } else {
                        // 点击笔记卡片
                        loadNote(parseInt(this.dataset.id));
                    }
                });
            });
        }

        // 格式化日期
        function formatDate(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) {
                // 今天
                const hours = date.getHours().toString().padStart(2, '0');
                const minutes = date.getMinutes().toString().padStart(2, '0');
                return `今天 ${hours}:${minutes}`;
            } else if (diffDays === 1) {
                // 昨天
                const hours = date.getHours().toString().padStart(2, '0');
                const minutes = date.getMinutes().toString().padStart(2, '0');
                return `昨天 ${hours}:${minutes}`;
            } else if (diffDays < 7) {
                // 一周内
                const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
                return weekdays[date.getDay()];
            } else {
                // 更早
                return date.toLocaleDateString('zh-CN', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
            }
        }

        // 加载笔记到编辑器
        function loadNote(id) {
            const note = notes.find(n => n.id === id);
            if (note) {
                currentNoteId = id;
                isNewNote = false;
                
                noteTitleInput.value = note.title;
                noteContentInput.value = note.content;
                noteDateDisplay.textContent = `最后修改: ${formatDate(note.updatedAt)}`;
                
                noNoteSelected.style.display = 'none';
                editorContent.style.display = 'block';
                
                renderNotesList();
            }
        }

        // 新建笔记
        function createNewNote() {
            currentNoteId = null;
            isNewNote = true;
            
            noteTitleInput.value = '';
            noteContentInput.value = '';
            noteDateDisplay.textContent = `新建笔记`;
            
            noNoteSelected.style.display = 'none';
            editorContent.style.display = 'block';
            
            renderNotesList();
        }

        // 保存笔记
        function saveNote() {
            const title = noteTitleInput.value.trim();
            const content = noteContentInput.value.trim();
            
            if (isNewNote) {
                // 新建笔记
                const newNote = {
                    id: Date.now(),
                    title: title,
                    content: content,
                    createdAt: Date.now(),
                    updatedAt: Date.now()
                };
                notes.unshift(newNote);
                currentNoteId = newNote.id;
                isNewNote = false;
                showToast('笔记已创建');
            } else {
                // 更新笔记
                const note = notes.find(n => n.id === currentNoteId);
                if (note) {
                    note.title = title;
                    note.content = content;
                    note.updatedAt = Date.now();
                    showToast('笔记已保存');
                }
            }
            
            saveNotesToStorage();
            renderNotesList();
            
            // 更新日期显示
            if (currentNoteId) {
                const note = notes.find(n => n.id === currentNoteId);
                if (note) {
                    noteDateDisplay.textContent = `最后修改: ${formatDate(note.updatedAt)}`;
                }
            }
        }

        // 删除笔记
        function deleteNote(id) {
            notes = notes.filter(n => n.id !== id);
            saveNotesToStorage();
            
            if (currentNoteId === id) {
                // 如果删除的是当前正在编辑的笔记，重置编辑器
                currentNoteId = null;
                isNewNote = false;
                noNoteSelected.style.display = 'flex';
                editorContent.style.display = 'none';
            }
            
            renderNotesList();
            showToast('笔记已删除');
        }

        // 取消编辑
        function cancelEdit() {
            currentNoteId = null;
            isNewNote = false;
            noNoteSelected.style.display = 'flex';
            editorContent.style.display = 'none';
            renderNotesList();
        }

        // 切换排序方式
        function toggleSort() {
            sortOrder = sortOrder === 'desc' ? 'asc' : 'desc';
            sortText.textContent = sortOrder === 'desc' ? '最新优先' : '最早优先';
            renderNotesList();
        }

        // 显示提示消息
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 显示确认对话框
        function showConfirmModal() {
            confirmModal.classList.add('show');
        }

        // 隐藏确认对话框
        function hideConfirmModal() {
            confirmModal.classList.remove('show');
            noteToDelete = null;
        }

        // 设置事件监听器
        function setupEventListeners() {
            newNoteBtn.addEventListener('click', createNewNote);
            sortBtn.addEventListener('click', toggleSort);
            saveBtn.addEventListener('click', saveNote);
            cancelBtn.addEventListener('click', cancelEdit);
            confirmDelete.addEventListener('click', function() {
                if (noteToDelete !== null) {
                    deleteNote(noteToDelete);
                }
                hideConfirmModal();
            });
            confirmCancel.addEventListener('click', hideConfirmModal);
            
            // 点击模态框背景关闭
            confirmModal.addEventListener('click', function(e) {
                if (e.target === confirmModal) {
                    hideConfirmModal();
                }
            });

            // 自动保存（可选）
            noteTitleInput.addEventListener('input', function() {
                // 可以在这里实现实时自动保存
            });

            noteContentInput.addEventListener('input', function() {
                // 可以在这里实现实时自动保存
            });

            // 键盘快捷键
            document.addEventListener('keydown', function(e) {
                // Ctrl+S 或 Cmd+S 保存
                if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                    e.preventDefault();
                    if (editorContent.style.display !== 'none') {
                        saveNote();
                    }
                }
                
                // Ctrl+N 或 Cmd+N 新建笔记
                if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
                    e.preventDefault();
                    createNewNote();
                }
                
                // Esc 取消编辑
                if (e.key === 'Escape') {
                    if (editorContent.style.display !== 'none') {
                        cancelEdit();
                    }
                }
            });
        }
    </script>
</body>
</html>
